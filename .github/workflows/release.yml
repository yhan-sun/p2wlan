name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  macos:
    name: macOS Universal DMG
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build universal macOS app and DMG
        run: scripts/package-macos.sh --target universal-apple-darwin

      - name: Assemble macOS release artifacts
        run: |
          mkdir -p dist-release
          cp target/universal-apple-darwin/release/bundle/dmg/*.dmg dist-release/p2wlan-macos-universal.dmg
          ditto -c -k --keepParent target/universal-apple-darwin/release/bundle/macos/p2wlan.app dist-release/p2wlan-macos-universal.app.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: p2wlan-macos-universal
          path: |
            dist-release/p2wlan-macos-universal.dmg
            dist-release/p2wlan-macos-universal.app.zip

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist-release/p2wlan-macos-universal.dmg
            dist-release/p2wlan-macos-universal.app.zip

  windows:
    name: Windows x64 Package
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build daemon
        run: cargo build -p p2pnet-daemon --release --target x86_64-pc-windows-msvc

      - name: Build desktop shell
        run: pnpm tauri build --no-bundle --target x86_64-pc-windows-msvc

      - name: Download Wintun runtime
        shell: pwsh
        run: |
          $url = "https://www.wintun.net/builds/wintun-0.14.1.zip"
          $zip = Join-Path $env:RUNNER_TEMP "wintun.zip"
          Invoke-WebRequest -Uri $url -OutFile $zip
          $hash = (Get-FileHash $zip -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($hash -ne "07c256185d6ee3652e09fa55c0b673e2624b565e02c4b9091c79ca7d2f24ef51") {
            throw "Unexpected Wintun SHA256: $hash"
          }
          Expand-Archive -Path $zip -DestinationPath (Join-Path $env:RUNNER_TEMP "wintun") -Force

      - name: Assemble portable zip
        shell: pwsh
        run: |
          $pkg = Join-Path $PWD "dist-release\p2wlan-windows-x64"
          New-Item -ItemType Directory -Force -Path $pkg | Out-Null
          Copy-Item "target\x86_64-pc-windows-msvc\release\p2pnet-daemon.exe" $pkg
          Copy-Item "target\x86_64-pc-windows-msvc\release\p2wlan-desktop.exe" $pkg
          Copy-Item (Join-Path $env:RUNNER_TEMP "wintun\wintun\bin\amd64\wintun.dll") $pkg
          @"
          p2wlan Windows x64 便携版

          1. 请把 p2wlan-desktop.exe、p2pnet-daemon.exe、wintun.dll 放在同一个文件夹。
          2. 双击启动 p2wlan-desktop.exe。
          3. 登录或注册控制面账号。
          4. 点击“授权启动 TUN”，在 Windows UAC 弹窗中选择“是”。

          p2wlan 不会读取或保存 Windows 密码，管理员授权由 Windows 系统完成。
          "@ | Set-Content -Path (Join-Path $pkg "README-WINDOWS.txt") -Encoding UTF8
          Compress-Archive -Path "$pkg\*" -DestinationPath "dist-release\p2wlan-windows-x64.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: p2wlan-windows-x64
          path: dist-release/p2wlan-windows-x64.zip

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist-release/p2wlan-windows-x64.zip

  linux-cli:
    name: Linux ${{ matrix.arch }} CLI Package
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            target: x86_64-unknown-linux-gnu
            cross_packages: ""
          - arch: arm64
            target: aarch64-unknown-linux-gnu
            cross_packages: gcc-aarch64-linux-gnu
    env:
      CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
      CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross compiler
        if: matrix.cross_packages != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.cross_packages }}

      - name: Build Linux CLI and daemon
        run: cargo build -p p2wlan-cli -p p2pnet-daemon --release --target ${{ matrix.target }}

      - name: Assemble Linux CLI tarball
        run: |
          set -euo pipefail
          name="p2wlan-linux-${{ matrix.arch }}-cli"
          pkg="dist-release/$name"
          mkdir -p "$pkg"
          cp target/${{ matrix.target }}/release/p2wlan "$pkg/"
          cp target/${{ matrix.target }}/release/p2pnet-daemon "$pkg/"
          cp scripts/install-linux-cli.sh "$pkg/install.sh"
          cp LICENSE "$pkg/"
          cat > "$pkg/README-LINUX-CLI.txt" <<'EOF'
          p2wlan Linux CLI Preview

          Contents:
          - p2wlan: user-facing command-line client
          - p2pnet-daemon: background daemon with real Linux TUN support
          - install.sh: system-wide installer
          - LICENSE

          Quick start:
          1. sudo ./install.sh
          2. p2wlan login -u you@example.com
          3. p2wlan up
          4. p2wlan status

          Common commands:
          - p2wlan config show
          - p2wlan config set device-name linux-server
          - p2wlan logs -f
          - p2wlan down
          - p2wlan help

          Notes:
          - `p2wlan up` requests sudo only when creating TUN and routes.
          - Login and configuration commands must be run without sudo.
          - Supplying `-p` is supported for automation, but interactive password input is safer.
          - For self-hosting, run the Go control and relay services separately.
          EOF
          chmod +x "$pkg/p2wlan" "$pkg/p2pnet-daemon" "$pkg/install.sh"
          tar -C dist-release -czf "dist-release/$name.tar.gz" "$name"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: p2wlan-linux-${{ matrix.arch }}-cli
          path: dist-release/p2wlan-linux-${{ matrix.arch }}-cli.tar.gz

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist-release/p2wlan-linux-${{ matrix.arch }}-cli.tar.gz
